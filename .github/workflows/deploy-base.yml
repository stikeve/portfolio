name: Build and Deploy base

on:
  push:
    branches: [ "main" ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Install and build Vite app
      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Deploy dist/ folder via FTP
      - name: FTP deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:  
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_BASE_DIR }}
          protocol: ftp
          port:  ${{ secrets.FTP_PORT }}
          log-level: verbose

