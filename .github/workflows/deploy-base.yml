name: Deploy base site
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  base:
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: deploy-base
      REMOTE_REPO: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/stikeve/portfolio.git
      SITE_DIR: /home/secrets.HOSTINGER_USER/public_html
      SITE_NAME: Base portfolio site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Publish dist to deploy-base without force
        run: |
          test -d dist || { echo "dist not found"; exit 1; }
          mkdir publish && cp -R dist/* publish/
          cd publish
          git init
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          # Pull existing history if branch already exists
          git pull --depth=1 ${{ env.REMOTE_REPO }} ${{ env.DEPLOY_BRANCH }} || echo "First publish"
          # Clean previous build
          find . -mindepth 1 -not -name ".git" -exec rm -rf {} +
          # Add new build
          cp -R ../dist/* .
          git add .
          git commit -m "Update build from ${GITHUB_SHA::7} for ${{ env.SITE_NAME }}" || echo "No changes to commit"
          git branch -M ${{ env.DEPLOY_BRANCH }}
          git remote add origin ${{ env.REMOTE_REPO }}
          git push origin ${{ env.DEPLOY_BRANCH }}

      - name: Pull latest on Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            git -C ${{ env.SITE_DIR }} pull --ff-only
